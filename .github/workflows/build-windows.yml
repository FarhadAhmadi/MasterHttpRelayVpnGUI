name: Build Windows

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        shell: pwsh
        run: dotnet restore gui/MasterRelayVPN.csproj

      - name: Publish WPF app
        shell: pwsh
        run: >
          dotnet publish gui/MasterRelayVPN.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o artifacts/publish

      - name: Zip artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/package | Out-Null
          Compress-Archive -Path artifacts/publish/* -DestinationPath artifacts/package/MasterRelayVPN-win-x64.zip -Force
          Get-FileHash artifacts/package/MasterRelayVPN-win-x64.zip -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  MasterRelayVPN-win-x64.zip" } |
            Set-Content -Encoding ASCII artifacts/package/SHA256SUMS.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: MasterRelayVPN-win-x64
          path: |
            artifacts/package/MasterRelayVPN-win-x64.zip
            artifacts/package/SHA256SUMS.txt
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release create $tag `
            artifacts/package/MasterRelayVPN-win-x64.zip `
            artifacts/package/SHA256SUMS.txt `
            --repo "${{ github.repository }}" `
            --title "MasterRelayVPN $tag" `
            --notes "Windows x64 release for MasterRelayVPN $tag."
