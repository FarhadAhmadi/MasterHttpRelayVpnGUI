  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore gui/MasterRelayVPN.csproj

      - name: Publish
        run: dotnet publish gui/MasterRelayVPN.csproj -c Release -r win-x64 --self-contained true -o build

      - name: Zip
        run: Compress-Archive -Path build/* -DestinationPath MasterRelayVPN.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: MasterRelayVPN.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
