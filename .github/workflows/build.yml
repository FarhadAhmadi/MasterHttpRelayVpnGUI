name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: '1.1.2'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build project
        run: |
          dotnet restore
          dotnet publish -c Release -r win-x64 --self-contained true -o build

      - name: Zip output
        # Fixed for Windows PowerShell compatibility
        run: Compress-Archive -Path .\build\* -DestinationPath MasterRelayVPN.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MasterRelayVPN
          path: MasterRelayVPN.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # This line tells it to use the manual input tag IF you clicked "Run workflow", 
          # otherwise it uses the standard push tag automatically.
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: MasterRelayVPN.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
